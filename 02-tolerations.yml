apiVersion: apps/v1
kind: Deployment
metadata:
  name: taints-tolerations
  labels:
    project: roboshop
    purpose: taints-demo
spec:
  replicas: 1
  selector: 
    matchLabels:
      project: roboshop
      purpose: tolerations-demo
  template:
    metadata:
      labels:
        project: roboshop
        purpose: tolerations-demo
    spec:
      nodeSelector:
        kubernetes.io/hostname: ip-192-168-29-186.ec2.internal 
      containers:
      - name: nginx
        image: nginx:latest
      tolerations:
      - key: "project"
        operator: "Equal"
        value: "roboshop"
        effect: "NoExecute"